<body>
    <!-- Booking Menu Items Selection Modal (User Facing Template) -->
    <div class="modal fade modal-dark-custom" id="bookingMenuModal" tabindex="-1"
        aria-labelledby="bookingMenuModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="bookingMenuModalLabel">Select Menu Items</h5>
                </div>
                <div class="modal-body">
                    <!-- Search and Filters -->
                    <div class="row g-2 align-items-center mb-3">
                        <div class="col-md-6 justify-content-center">
                            <div class="modal-search-wrapper">
                                <i class="bi bi-search"></i>
                                <input type="text" class="form-control justify-content-center align-items-center"
                                    id="modalSearchInput" placeholder="Search menu items...">
                            </div>
                        </div>
                        <div class="conta">
                            <div class="isotope-layout">
                                <div class="filter-tabs" id="modalFilterTabs">
                                    <ul>
                                        <div class="filter-tab active" data-filter="all">All</div>
                                        <div class="filter-tab" data-filter="starters">Starters</div>
                                        <div class="filter-tab" data-filter="main-course">Mains</div>
                                        <div class="filter-tab" data-filter="desserts">Desserts</div>
                                        <div class="filter-tab" data-filter="beverages">Beverages</div>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Scrollable menu item list -->
                    <div class="modal-menu-list" id="modalMenuContainer">
                        <!-- Example Static Card Item for Preview -->
                        <div class="col-md-6 menu-item-modal" data-category="desserts" data-name="chicken arrabiata">
                            <div class="modal-menu-card">
                                <img src="images/item-1.jpg" alt="Chicken Arrabiata"
                                    style="width: 100%; height: 150px; object-fit: cover; border-radius: 8px;">
                                <div class="menu-card-content mt-2">
                                    <h4 class="modal-menu-card-title">Chicken Arrabiata</h5>
                                        <span class="modal-menu-card-price">$14.50</span>
                                        <div class="qty-adjuster mt-2 d-flex align-items-center gap-2">
                                            <button class="btn-minus" type="button" onclick="decrement()">-</button>
                                            <input type="text" value="0" class="qtyInput" readonly
                                                style="width: 20px; text-align: center;">
                                            <button class="btn-plus" type="button" onclick="increment()">+</button>
                                        </div>
                                </div>
                            </div>
