<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavora - Create an Account</title>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">
    <!-- Project Stylesheet -->
    <link rel="stylesheet" href="../style.css">
</head>

<body class="user-login-body">
    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="row signup-card w-100 g-0 shadow-lg">

            <!-- LEFT PANEL: Visual image with overlay content -->
            <div class="col-lg-6 d-none d-lg-block position-relative visual-panel">
                <div class="visual-header d-flex justify-content-between align-items-center p-4">
                    <span class="logo-text">Flavora</span>
                    <a href="../index.html" class="back-btn-pill">Back to website &rarr;</a>
                </div>
                <div class="image-overlay-wrapper">
                    <img src="../images/rest-1.jpg" alt="Dining atmosphere" class="visual-img">
                    <div class="dark-gradient-overlay"></div>
                </div>
                <div class="visual-content p-5">
                    <h2 class="visual-title">Savor the Moment,<br>Create Memories</h2>

                </div>
            </div>

            <!-- RIGHT PANEL: Registration Form -->
            <div class="col-lg-6 d-flex align-items-center justify-content-center p-4 p-md-5 form-panel">
                <div class="w-100" style="max-width: 440px;">
                    <div class="form-header mb-4">
                        <h1 class="form-title">Create an account</h1>
                        <p class="form-subtitle">Already have an account? <a href="#" class="accent-link">Log in</a></p>
                    </div>

                    <form id="signupForm" class="d-flex flex-column gap-3">
                        <!-- Name Inputs Row -->
                        <div class="form-input-container">
                            <input type="text" id="username" class="form-input-field" placeholder="Username" required>
                        </div>
                        <!-- Email Input -->
                        <div class="form-input-container">
                            <input type="email" id="email" class="form-input-field" placeholder="Email" required>
                        </div>
                        <!--Phone Input Row-->
                        <div class="form-input-container">
                            <input type="tel" id="phone" class="form-input-field" placeholder="Phone Number" required>
                        </div>
                        <!-- Password Input with Toggle Eye -->
                        <div class="form-input-container password-container position-relative">
                            <input type="password" id="password" class="form-input-field"
                                placeholder="Enter your password" required>
                        </div>
                        <div class="form-input-container confirm-password-container position-relative">
                            <input type="password" id="confirmPassword" class="form-input-field"
                                placeholder="Confirm your password" required>
                        </div>
                        <!-- Create Account Button -->
                        <button type="submit" class="btn btn-create-account w-100 py-3 mt-3">Create
                            account</button>
                    </form>
                </div>
            </div>

        </div>
    </div>
    <script src="user_signup.js"></script>
</body>

</html>
