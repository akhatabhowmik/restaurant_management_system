<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavora - Profile</title>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">
    <!-- Project Stylesheet -->
    <link rel="stylesheet" href="../style.css">
</head>

<body class="user-login-body">
    <nav class="navbar navbar-expand-lg fixed-top z-3" data-bs-theme="dark">
        <div class="container">
            <a class="navbar-brand fs-3" href="#"><b>Flavora</b></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="../index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html#about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html#menu">Menu</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html#chefs">Chefs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html#book-a-table">Book a Table</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html#contacts">Contacts</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" id="profileName" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Username
                        </a>
                        <ul class="dropdown-menu">
                            <li class="dropdown-item" id="login">
                                <a class="dropdown-link" href="#">Login</a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="container mt-5 pt-5 min-vh-100">
            <div class="row g-4 mt-3">
                <!-- LEFT SIDEBAR: Navigation Tabs -->
                <div class="col-md-3 pe-md-5">
                    <div class="d-flex flex-column align-items-center mb-4 text-white text-center">
                        <div id="profileAvatar"
                            class="d-flex align-items-center justify-content-center rounded-circle bg-warning text-black fs-2 fw-bold mv-2 shadow"
                            style="width: 80px; height: 80px;"></div>
                        <h5 class="mb-0 mt-4" id="avatarName">Loading...</h5>
                    </div>
                    <div class="list-group shadow" id="profileTabs" role="tablist">
                        <button
                            class="list-group-item list-group-item-action active bg-black text-white border-secondary"
                            id="tab-profile-btn" data-bs-toggle="list" data-bs-target="#tab-profile" type="button"
                            role="tab">
                            <i class="bi bi-person-circle me-2"></i> Profile Details
                        </button>
                        <button class="list-group-item list-group-item-action bg-black text-white border-secondary"
                            id="tab-reservations-btn" data-bs-toggle="list" data-bs-target="#tab-reservations"
                            type="button" role="tab">
                            <i class="bi bi-clock-history me-2"></i> Reservation History
                        </button>
                    </div>
                </div>

                <!-- RIGHT PANEL: Display Container -->
                <div class="col-md-9 ps-4">
                    <div class="tab-content" id="tabContent">

                        <!-- TAB 1: Profile Details Form -->
                        <div class="tab-pane fade show active" id="tab-profile" role="tabpanel">
                            <div class="card p-4 bg-black text-white border-secondary shadow">
                                <h4 class="mb-4"><i class="bi bi-person-fill"></i> My Profile</h4>
                                <form id="profileForm" class="d-flex flex-column gap-3">
                                    <div>
                                        <label class="form-label text-white">Username</label>
                                        <input type="text" id="editUsername"
                                            class="form-control bg-dark text-white border-secondary" required>
                                    </div>
                                    <div>
                                        <label class="form-label text-white">Email (Cannot be modified)</label>
                                        <input type="email" id="editEmail"
                                            class="form-control bg-dark text-muted border-secondary" disabled>
                                    </div>
                                    <div>
                                        <label class="form-label text-white">Phone Number</label>
                                        <input type="tel" id="editPhone"
                                            class="form-control bg-dark text-white border-secondary" required>
                                    </div>
                                    <button type="submit" class="btn mt-3 w-25 mx-auto d-block align-items-center"
                                        style="background-color: #eb8d07; color: white;">Save
                                        Changes</button>
                                </form>
                            </div>
                        </div>

                        <!-- TAB 2: Reservation History Table -->
                        <div class="tab-pane fade" id="tab-reservations" role="tabpanel">
                            <div class="card p-4 bg-black text-white border-secondary shadow">
                                <h4 class="mb-4"><i class="bi bi-calendar-check-fill"></i> Reservation History</h4>
                                <div class="table-responsive">
                                    <table class="table table-dark mt-2 align-middle">
                                        <thead>
                                            <tr>
                                                <th scope="col">Sl No.</th>
                                                <th scope="col">Date</th>
                                                <th scope="col">Time</th>
                                                <th scope="col">Party Size</th>
                                                <th scope="col">Event Type</th>
                                                <th scope="col">Menu Items</th>
                                            </tr>
                                        </thead>
                                        <tbody id="reservationTable">
                                            <tr>
                                                <td colspan="6" class="text-center text-muted">Loading reservations...
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="user_profile.js"></script>
    <script src="../script.js"></script>

</body>

</html>
